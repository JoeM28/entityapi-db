name: PR Analysis

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write   # post PR comment
  models: read           # call GitHub Models (Copilot) API

jobs:
  analyze:
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for git diff

      - name: Analyze PR using SKILLS.md + GitHub Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA:     ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:     ${{ github.event.pull_request.head.sha }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER:    ${{ github.event.pull_request.number }}
          OUTPUT_FILE:  pr_report.md
        run: python scripts\pr_analysis.py

      - name: Post analysis report as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file pr_report.md
