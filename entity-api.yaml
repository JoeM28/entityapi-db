openapi: 3.0.3

info:
  title: Entity API
  description: |
    REST API for managing Customer Account entities.
    Supports Account and Customer sub-resources under the /entity base path.

    **URL Structure:**
    - Account resource:    `/entity/account`
    - Customer resource:   `/entity/customer`

    **Operations:**
    - `GET  /entity/account`              — Retrieve all Account records
    - `GET  /entity/account/{accountId}`  — Retrieve one Account by ID
    - `POST /entity/account`              — Insert or Update an Account
    - `GET  /entity/customer`             — Retrieve all Customer records
    - `GET  /entity/customer/{customerId}`— Retrieve one Customer by ID
    - `POST /entity/customer`             — Insert or Update a Customer
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@company.com

servers:
  - url: https://api.company.com/v1
    description: Production server
  - url: https://api-dev.company.com/v1
    description: Development server

tags:
  - name: Account
    description: Account sub-resource operations
  - name: Customer
    description: Customer sub-resource operations

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── GET /entity/account — retrieve ALL accounts ─────────────────────────
  /entity/account:
    get:
      tags:
        - Account
      summary: Retrieve all Account records
      description: |
        Returns all Account records.
        Supports optional filtering by status via query parameters.
        Results are paginated — use `page` and `size` to navigate.
      operationId: getAllAccounts
      parameters:
        - name: status
          in: query
          required: false
          description: Filter accounts by status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED, CLOSED, PENDING, CANCEL]
          example: ACTIVE
        - name: page
          in: query
          required: false
          description: Page number for pagination (0-based)
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: size
          in: query
          required: false
          description: Number of records per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          example: 20
      responses:
        '200':
          description: Successfully retrieved list of Account records
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRecords:
                    type: integer
                    description: Total number of Account records matching the filter
                    example: 100
                  page:
                    type: integer
                    description: Current page number
                    example: 0
                  size:
                    type: integer
                    description: Page size
                    example: 20
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountRecord'
              examples:
                allAccounts:
                  summary: List of Account records
                  value:
                    totalRecords: 2
                    page: 0
                    size: 20
                    records:
                      - docType: Account
                        accountNumber: 123456789
                        name:
                          legalName: Acme Corporation
                          dbaName: Acme Corp
                        address:
                          line1: 123 Main Street
                          city: Dallas
                          state: TX
                          countryCode: USA
                        dob: 01-15-1990
                        status: ACTIVE
                        lastUpdateDate: "2026-03-01"
                        lastUpdateTimestamp: "2026-03-01T10:30:00Z"
                      - docType: Account
                        accountNumber: 111222333
                        name:
                          legalName: Beta Corporation
                          dbaName: Beta Corp
                        address:
                          line1: 789 Oak Avenue
                          city: Austin
                          state: TX
                          countryCode: USA
                        dob: 03-22-1985
                        status: ACTIVE
                        lastUpdateDate: "2026-02-15"
                        lastUpdateTimestamp: "2026-02-15T08:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Account
      summary: Insert or Update an Account
      description: |
        Creates a new Account or updates an existing one.
        This is an upsert operation — if the `accountNumber` already exists
        in the datastore the record is updated. If it does not exist a new
        record is inserted.

        **Required fields for Account:**
        - `docType` must be `"Account"`
        - `accountNumber` is required (used as the document key)
        - `name.legalName` is required
        - `address.line1` is required
        - `status` is required
      operationId: upsertAccount
      requestBody:
        required: true
        description: Account record to insert or update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRecord'
            examples:
              insertAccount:
                summary: Insert a new Account
                value:
                  docType: Account
                  accountNumber: 123456789
                  name:
                    legalName: Acme Corporation
                    dbaName: Acme Corp
                  address:
                    line1: 123 Main Street
                    city: Dallas
                    state: TX
                    countryCode: USA
                  dob: 01-15-1990
                  status: ACTIVE
              updateAccountStatus:
                summary: Update an existing Account status
                value:
                  docType: Account
                  accountNumber: 123456789
                  name:
                    legalName: Acme Corporation
                  address:
                    line1: 123 Main Street
                  status: SUSPENDED
      responses:
        '200':
          description: Account updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountRecord'
              examples:
                updatedAccount:
                  summary: Updated Account with server-set timestamps
                  value:
                    docType: Account
                    accountNumber: 123456789
                    name:
                      legalName: Acme Corporation
                      dbaName: Acme Corp
                    address:
                      line1: 123 Main Street
                      city: Dallas
                      state: TX
                      countryCode: USA
                    dob: 01-15-1990
                    status: ACTIVE
                    lastUpdateDate: "2026-03-01"
                    lastUpdateTimestamp: "2026-03-01T10:30:00Z"
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ── /entity/account/{accountId} — GET one Account ───────────────────────
  /entity/account/{accountId}:
    get:
      tags:
        - Account
      summary: Retrieve one Account by ID
      description: |
        Returns a single Account record identified by its accountId.
        Returns 404 if no Account exists with that ID.
      operationId: getAccountById
      parameters:
        - name: accountId
          in: path
          required: true
          description: Unique Account Number — the document key
          schema:
            type: integer
            format: int64
          example: 123456789
      responses:
        '200':
          description: Account record found and returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountRecord'
              examples:
                accountExample:
                  summary: A single active Account record
                  value:
                    docType: Account
                    accountNumber: 123456789
                    name:
                      legalName: Acme Corporation
                      dbaName: Acme Corp
                    address:
                      line1: 123 Main Street
                      city: Dallas
                      state: TX
                      countryCode: USA
                    dob: 01-15-1990
                    status: ACTIVE
                    lastUpdateDate: "2026-03-01"
                    lastUpdateTimestamp: "2026-03-01T10:30:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ── /entity/customer/{customerId} — GET one Customer ────────────────────
  /entity/customer/{customerId}:
    get:
      tags:
        - Customer
      summary: Retrieve one Customer by ID
      description: |
        Returns a single Customer record identified by its customerId.
        Returns 404 if no Customer exists with that ID.
      operationId: getCustomerById
      parameters:
        - name: customerId
          in: path
          required: true
          description: Unique Customer ID — the document key
          schema:
            type: integer
            format: int64
          example: 987654321
      responses:
        '200':
          description: Customer record found and returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerRecord'
              examples:
                customerExample:
                  summary: A single active Customer record
                  value:
                    docType: Customer
                    customerId: 987654321
                    name:
                      legalName: John Doe
                      dbaName: JD Enterprises
                    address:
                      line1: 456 Elm Street
                      city: Houston
                      state: TX
                      countryCode: USA
                    dob: 06-20-1985
                    status: ACTIVE
                    lastUpdateDate: "2026-03-01"
                    lastUpdateTimestamp: "2026-03-01T10:30:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ── /entity/customer — GET all customers + POST insert or update ─────────
  /entity/customer:
    get:
      tags:
        - Customer
      summary: Retrieve all Customer records
      description: |
        Returns all Customer records.
        Supports optional filtering by status via query parameters.
        Results are paginated — use `page` and `size` to navigate.
      operationId: getAllCustomers
      parameters:
        - name: status
          in: query
          required: false
          description: Filter customers by status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, SUSPENDED, CLOSED, PENDING, CANCEL]
          example: ACTIVE
        - name: page
          in: query
          required: false
          description: Page number for pagination (0-based)
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
        - name: size
          in: query
          required: false
          description: Number of records per page
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          example: 20
      responses:
        '200':
          description: Successfully retrieved list of Customer records
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRecords:
                    type: integer
                    description: Total number of Customer records matching the filter
                    example: 50
                  page:
                    type: integer
                    description: Current page number
                    example: 0
                  size:
                    type: integer
                    description: Page size
                    example: 20
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomerRecord'
              examples:
                allCustomers:
                  summary: List of Customer records
                  value:
                    totalRecords: 2
                    page: 0
                    size: 20
                    records:
                      - docType: Customer
                        customerId: 987654321
                        name:
                          legalName: John Doe
                          dbaName: JD Enterprises
                        address:
                          line1: 456 Elm Street
                          city: Houston
                          state: TX
                          countryCode: USA
                        dob: 06-20-1985
                        status: ACTIVE
                        lastUpdateDate: "2026-03-01"
                        lastUpdateTimestamp: "2026-03-01T10:30:00Z"
                      - docType: Customer
                        customerId: 111333555
                        name:
                          legalName: Jane Smith
                          dbaName: JS Consulting
                        address:
                          line1: 321 Pine Road
                          city: San Antonio
                          state: TX
                          countryCode: USA
                        dob: 09-10-1992
                        status: INACTIVE
                        lastUpdateDate: "2026-01-10"
                        lastUpdateTimestamp: "2026-01-10T14:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Customer
      summary: Insert or Update a Customer
      description: |
        Creates a new Customer or updates an existing one.
        This is an upsert operation — if the `customerId` already exists
        in the datastore the record is updated. If it does not exist a new
        record is inserted.

        **Required fields for Customer:**
        - `docType` must be `"Customer"`
        - `customerId` is required (used as the document key)
        - `name.legalName` is required
        - `address.line1` is required
        - `status` is required
      operationId: upsertCustomer
      requestBody:
        required: true
        description: Customer record to insert or update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRecord'
            examples:
              insertCustomer:
                summary: Insert a new Customer
                value:
                  docType: Customer
                  customerId: 987654321
                  name:
                    legalName: John Doe
                    dbaName: JD Enterprises
                  address:
                    line1: 456 Elm Street
                    city: Houston
                    state: TX
                    countryCode: USA
                  dob: 06-20-1985
                  status: ACTIVE
              updateCustomerStatus:
                summary: Update an existing Customer status
                value:
                  docType: Customer
                  customerId: 987654321
                  name:
                    legalName: John Doe
                  address:
                    line1: 456 Elm Street
                  status: INACTIVE
      responses:
        '200':
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerRecord'
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerRecord'
              examples:
                createdCustomer:
                  summary: Newly created Customer with server-set timestamps
                  value:
                    docType: Customer
                    customerId: 987654321
                    name:
                      legalName: John Doe
                      dbaName: JD Enterprises
                    address:
                      line1: 456 Elm Street
                      city: Houston
                      state: TX
                      countryCode: USA
                    dob: 06-20-1985
                    status: ACTIVE
                    lastUpdateDate: "2026-03-01"
                    lastUpdateTimestamp: "2026-03-01T10:30:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS — Reusable schemas, responses, and examples
# ─────────────────────────────────────────────────────────────────────────────
components:

  # ── SCHEMAS ───────────────────────────────────────────────────────────────
  schemas:

    # Shared Name object — used by both Account and Customer
    Name:
      type: object
      description: Customer name details
      properties:
        legalName:
          type: string
          maxLength: 20
          description: Legal name of the customer
          example: Acme Corporation
        dbaName:
          type: string
          maxLength: 20
          description: Doing Business As name
          example: Acme Corp
      required:
        - legalName

    # Shared Address object — used by both Account and Customer
    Address:
      type: object
      description: Customer address details
      properties:
        line1:
          type: string
          maxLength: 20
          description: Street address line 1
          example: 123 Main Street
        city:
          type: string
          maxLength: 20
          description: City name
          example: Dallas
        state:
          type: string
          minLength: 2
          maxLength: 2
          pattern: '^[A-Z]{2}$'
          description: 2-character alpha state code
          example: TX
        countryCode:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          description: 3-character ISO alpha country code
          example: USA
      required:
        - line1

    # Account-specific schema — docType must be Account, accountNumber required
    AccountRecord:
      type: object
      description: Account entity record
      properties:
        docType:
          type: string
          enum: [Account]
          description: Document type — must be Account for this resource
          example: Account
        accountNumber:
          type: integer
          format: int64
          description: Unique account identifier — used as document key
          example: 123456789
        name:
          $ref: '#/components/schemas/Name'
        address:
          $ref: '#/components/schemas/Address'
        dob:
          type: string
          pattern: '^(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])-[0-9]{4}$'
          description: Date of Birth in MM-DD-CCYY format
          example: 01-15-1990
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, CLOSED, PENDING, CANCEL]
          description: Current account status
          example: ACTIVE
        lastUpdateDate:
          type: string
          format: date
          description: Date of last update — server-set on POST (YYYY-MM-DD)
          readOnly: true
          example: "2026-03-01"
        lastUpdateTimestamp:
          type: string
          format: date-time
          description: Full timestamp of last update — server-set on POST (ISO 8601)
          readOnly: true
          example: "2026-03-01T10:30:00Z"
      required:
        - docType
        - accountNumber
        - name
        - address
        - status

    # Customer-specific schema — docType must be Customer, customerId required
    CustomerRecord:
      type: object
      description: Customer entity record
      properties:
        docType:
          type: string
          enum: [Customer]
          description: Document type — must be Customer for this resource
          example: Customer
        customerId:
          type: integer
          format: int64
          description: Unique customer identifier — used as document key
          example: 987654321
        name:
          $ref: '#/components/schemas/Name'
        address:
          $ref: '#/components/schemas/Address'
        dob:
          type: string
          pattern: '^(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])-[0-9]{4}$'
          description: Date of Birth in MM-DD-CCYY format
          example: 06-20-1985
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, CLOSED, PENDING, CANCEL]
          description: Current customer status
          example: ACTIVE
        lastUpdateDate:
          type: string
          format: date
          description: Date of last update — server-set on POST (YYYY-MM-DD)
          readOnly: true
          example: "2026-03-01"
        lastUpdateTimestamp:
          type: string
          format: date-time
          description: Full timestamp of last update — server-set on POST (ISO 8601)
          readOnly: true
          example: "2026-03-01T10:30:00Z"
      required:
        - docType
        - customerId
        - name
        - address
        - status

    # Combined schema — used by GET /entity which returns both types
    EntityRecord:
      type: object
      description: |
        A single entity record — can be either an Account or a Customer.
        Use the docType field to determine which type was returned.
      properties:
        docType:
          type: string
          enum: [Account, Customer]
          description: Identifies whether this record is an Account or Customer
          example: Account
        accountNumber:
          type: integer
          format: int64
          description: Present when docType is Account
          example: 123456789
        customerId:
          type: integer
          format: int64
          description: Present when docType is Customer
          example: 987654321
        name:
          $ref: '#/components/schemas/Name'
        address:
          $ref: '#/components/schemas/Address'
        dob:
          type: string
          pattern: '^(0[1-9]|1[0-2])-(0[1-9]|[12][0-9]|3[01])-[0-9]{4}$'
          description: Date of Birth in MM-DD-CCYY format
          example: 01-15-1990
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED, CLOSED, PENDING, CANCEL]
          description: Current status
          example: ACTIVE
        lastUpdateDate:
          type: string
          format: date
          description: Date of last update (YYYY-MM-DD)
          example: "2026-03-01"
        lastUpdateTimestamp:
          type: string
          format: date-time
          description: Full timestamp of last update (ISO 8601)
          example: "2026-03-01T10:30:00Z"
      required:
        - docType
        - name
        - address
        - status

    # Standard error response schema
    ErrorResponse:
      type: object
      description: Standard error response body
      properties:
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Short error name
          example: Bad Request
        message:
          type: string
          description: Human-readable description of what went wrong
          example: Validation failed for one or more fields
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
          example: "2026-03-01T10:30:00Z"
        path:
          type: string
          description: The request path that caused the error
          example: /entity/account
        errors:
          type: array
          description: Field-level validation error details
          items:
            type: object
            properties:
              field:
                type: string
                description: The field that failed validation
                example: address.state
              message:
                type: string
                description: What was wrong with the field value
                example: State must be 2 uppercase letters

  # ── REUSABLE RESPONSES ───────────────────────────────────────────────────
  responses:

    BadRequest:
      description: |
        Bad Request — the request body or parameters failed validation.
        Check the errors array for field-level details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              summary: Field validation failure
              value:
                status: 400
                error: Bad Request
                message: Validation failed for one or more fields
                timestamp: "2026-03-01T10:30:00Z"
                path: /entity/account
                errors:
                  - field: address.state
                    message: State must be 2 uppercase letters matching ^[A-Z]{2}$
                  - field: name.legalName
                    message: Legal name must not exceed 20 characters
                  - field: dob
                    message: DOB must be in MM-DD-CCYY format

    NotFound:
      description: |
        Not Found — no record exists with the provided ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              summary: Record not found
              value:
                status: 404
                error: Not Found
                message: No Account found with accountNumber 999999999
                timestamp: "2026-03-01T10:30:00Z"
                path: /entity/account/999999999

    InternalServerError:
      description: |
        Internal Server Error — an unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            serverError:
              summary: Unexpected server error
              value:
                status: 500
                error: Internal Server Error
                message: An unexpected error occurred. Please try again later.
                timestamp: "2026-03-01T10:30:00Z"
                path: /entity/account
